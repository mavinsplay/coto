<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>
    {% block title %}
    Coto
    {% endblock %}
    </title>

    {% load static %}
    
    <!-- Bootstrap & Core CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.css' %}">
    
    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    
    {% block extra_css %}{% endblock %}
    
    <!-- Scripts -->
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.js' %}" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.0" defer></script>
    
    <link rel="icon" type="image/x-icon" href="{% static 'favicons/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="48x48" href="{% static 'favicons/favicon-48x48.png' %}">
    <link rel="icon" type="image/png" sizes="64x64" href="{% static 'favicons/favicon-64x64.png' %}">
    <link rel="icon" type="image/png" sizes="128x128" href="{% static 'favicons/favicon-128x128.png' %}">
    <link rel="icon" type="image/png" sizes="256x256" href="{% static 'favicons/favicon-256x256.png' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicons/favicon.svg' %}">
    <link rel="apple-touch-icon" sizes="192x192" href="{% static 'favicons/android-chrome-192x192.png' %}">
    <link rel="manifest" href="{% static 'favicons/site.webmanifest' %}">

  </head>
  <body class="wrapper">
    
    {% include "includes/header.html" %}
    
    <main>
      {% block content %}
      <div class="d-flex justify-content-center">
        <div class="m-5 spinner-border" role="status"/>
      </div>
      {% endblock %}
    </main>

    {% include "includes/footer.html" %}
    
    {% block extra_js %}{% endblock %}
  </body>
</html>
